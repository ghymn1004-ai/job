name: Deploy to iiumai DO Server

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare SSH key
        run: |
          mkdir -p ~/.ssh
          printf "%s\n" "${{ secrets.DO_SSH_KEY }}" > ~/.ssh/iiumai_key
          chmod 600 ~/.ssh/iiumai_key

      - name: Deploy files
        run: |
          scp -i ~/.ssh/iiumai_key -o StrictHostKeyChecking=no -r ./* ${{ secrets.DO_USER }}@${{ secrets.DO_HOST }}:${{ secrets.DO_TARGET }}/
